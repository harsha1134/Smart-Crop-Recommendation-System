<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Crop Recommendation</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Roboto', sans-serif;
        background: linear-gradient(to right, #2e7d32, #4caf50);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #fff;
        padding: 20px;
        margin: 0;
    }

    .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 40px 30px;
        border-radius: 20px;
        max-width: 450px;
        width: 90%;
        box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        text-align: center;
        position: relative;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 25px;
        color: #ffeb3b;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    form {
        display: grid;
        gap: 15px;
    }

    label {
        font-weight: 500;
        text-align: left;
        display: block;
        margin-bottom: 5px;
    }

    input, select {
        width: 100%;
        padding: 12px 10px;
        border-radius: 10px;
        border: none;
        font-size: 1rem;
        outline: none;
        box-sizing: border-box;
        transition: 0.3s;
    }

    input:focus, select:focus {
        border: 2px solid #ffeb3b;
        background: rgba(255,255,255,0.2);
    }

    button {
        padding: 15px;
        background: #ffeb3b;
        color: #2e7d32;
        font-size: 1rem;
        font-weight: bold;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        margin-top: 10px;
    }

    button:hover {
        background: #fdd835;
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .login-link {
        margin-top: 15px;
        color: #ffeb3b;
        text-decoration: none;
        font-weight: 500;
        display: inline-block;
    }

    .login-link:hover {
        text-decoration: underline;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .terms {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
    }

    .terms input {
        width: auto;
    }

    .terms label {
        margin: 0;
        font-size: 0.9rem;
    }

    @media(max-width: 500px){
        .container {
            padding: 30px 20px;
        }
        
        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>
<div class="container">
    <h1>📝 Sign Up</h1>
    <form action="/signup" method="post">
        <div class="form-row">
            <div>
                <label for="firstname">First Name</label>
                <input type="text" name="firstname" id="firstname" required>
            </div>
            <div>
                <label for="lastname">Last Name</label>
                <input type="text" name="lastname" id="lastname" required>
            </div>
        </div>
        
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" required>
        
        <label for="username">Username</label>
        <input type="text" name="username" id="username" required>
        
        <div class="form-row">
            <div>
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <div>
                <label for="confirm-password">Confirm Password</label>
                <input type="password" name="confirm-password" id="confirm-password" required>
            </div>
        </div>
        
        <label for="location">Location/Region</label>
        <input type="text" name="location" id="location" placeholder="Enter your farming region">
        
        <label for="farm-size">Farm Size (acres)</label>
        <input type="number" name="farm-size" id="farm-size" min="0" step="0.1">
        
        <div class="terms">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the Terms & Conditions</label>
        </div>
        
        <button type="submit">Create Account</button>
    </form>
    <a href="/login" class="login-link">Already have an account? Login</a>
</div>

<script>
    // Simple password confirmation validation
    document.querySelector('form').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Passwords do not match. Please try again.');
            document.getElementById('password').focus();
        }
    });
</script>
</body>
</html>
